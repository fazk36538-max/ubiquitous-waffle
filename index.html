<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Background Remover & Generator</title>
  <style>
    :root { --primary: #4f46e5; --success: #16a34a; --warning: #f59e0b; --error: #dc2626; --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); padding: 20px; line-height: 1.5; }
    .container { max-width: 960px; margin: 0 auto; background: var(--card); padding: 24px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    h1 { text-align: center; margin-bottom: 8px; font-size: 1.8rem; }
    .subtitle { text-align: center; color: var(--muted); margin-bottom: 24px; font-size: 0.95rem; }
    
    .upload-area { border: 2px dashed #cbd5e1; border-radius: 12px; padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; background: #f8fafc; margin-bottom: 20px; }
    .upload-area:hover, .upload-area.dragover { border-color: var(--primary); background: #eef2ff; }
    .upload-area p { margin-bottom: 8px; color: var(--muted); }
    
    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    input[type="text"] { flex: 1; padding: 10px 14px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; min-width: 200px; }
    button { padding: 10px 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: 500; font-size: 14px; transition: all 0.2s; white-space: nowrap; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-warning { background: var(--warning); color: #000; }
    .btn-success { background: var(--success); color: white; }
    
    #statusBar { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; display: none; font-size: 14px; }
    #statusBar.visible { display: block; }
    .loading { background: #fef3c7; color: #92400e; }
    .success { background: #dcfce7; color: #166534; }
    .error { background: #fee2e2; color: #991b1b; }
    
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .preview-box { background: #f1f5f9; border-radius: 10px; padding: 10px; text-align: center; }
    .preview-box h3 { font-size: 14px; margin-bottom: 8px; color: var(--muted); }
    .preview-box img { max-width: 100%; height: auto; border-radius: 6px; display: block; margin: 0 auto; background: repeating-conic-gradient(#e2e8f0 0% 25%, transparent 0% 50%) 50% / 16px 16px; }
    
    .canvas-wrap { text-align: center; margin-top: 10px; }
    .canvas-wrap h3 { margin-bottom: 8px; font-size: 14px; color: var(--muted); }
    canvas { max-width: 100%; height: auto; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: repeating-conic-gradient(#e2e8f0 0% 25%, transparent 0% 50%) 50% / 16px 16px; }
    
    #modelStatus { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .progress-bar { height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.2s; }
    
    @media (max-width: 600px) {
      .controls { flex-direction: column; }
      input[type="text"] { width: 100%; }
      button { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🖼️ AI Background Remover & Generator</h1>
    <p class="subtitle">Upload → Remove BG → Generate AI Background → Download</p>
    <div id="modelStatus">⏳ Initializing AI Model...</div>
    
    <div class="upload-area" id="uploadArea">
      <p>📤 Drag & drop an image here or click to upload</p>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
    </div>
    
    <div id="statusBar"></div>
    <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
    
    <div class="controls">
      <input type="text" id="bgPrompt" placeholder="AI background prompt (e.g., 'cyberpunk city, neon lights, bokeh')" value="professional photo studio background, soft lighting">
      <button id="removeBgBtn" class="btn-primary" disabled>🔍 Remove Background</button>
      <button id="generateBgBtn" class="btn-warning" disabled>✨ Generate AI Background</button>
      <button id="downloadBtn" class="btn-success" disabled>⬇️ Download PNG</button>
    </div>
    
    <div class="preview-grid">
      <div class="preview-box"><h3>Original</h3><img id="originalImg" alt="Original"></div>
      <div class="preview-box"><h3>Foreground</h3><img id="foregroundImg" alt="Foreground"></div>
      <div class="preview-box"><h3>AI Background</h3><img id="backgroundImg" alt="Background"></div>
    </div>
    
    <div class="canvas-wrap">
      <h3>Final Composite</h3>
      <canvas id="resultCanvas"></canvas>
    </div>
  </div>

  <!-- Load AI Library via ES Module -->
  <script type="module">
    try {
      const { removeBackground } = await import('https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/+esm');
      window.removeBackgroundAI = removeBackground;
      document.getElementById('modelStatus').textContent = '✅ AI Model Ready (First run downloads ~30MB)';
      document.getElementById('modelStatus').style.color = 'var(--success)';
      document.getElementById('removeBgBtn').disabled = false;
    } catch (err) {
      document.getElementById('modelStatus').textContent = '❌ Failed to load AI model. Disable adblockers & refresh.';
      document.getElementById('modelStatus').style.color = 'var(--error)';
      console.error('Model load error:', err);
    }
  </script>

  <script>
    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');
    const statusBar = document.getElementById('statusBar');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    const originalImg = document.getElementById('originalImg');
    const foregroundImg = document.getElementById('foregroundImg');
    const backgroundImg = document.getElementById('backgroundImg');
    const resultCanvas = document.getElementById('resultCanvas');
    const ctx = resultCanvas.getContext('2d');
    const removeBgBtn = document.getElementById('removeBgBtn');
    const generateBgBtn = document.getElementById('generateBgBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const bgPrompt = document.getElementById('bgPrompt');

    let originalFile = null;
    let fgBlob = null, bgBlob = null;
    let fgImg = new Image();
    let bgImg = new Image();

    function setStatus(msg, type) {
      statusBar.textContent = msg;
      statusBar.className = `visible ${type}`;
    }

    function setProgress(pct) {
      progressBar.style.display = 'block';
      progressFill.style.width = `${pct}%`;
    }

    // Upload Handling
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', e => { if (e.target.files.length) handleFile(e.target.files[0]); });

    function handleFile(file) {
      if (!file.type.startsWith('image/')) { setStatus('❌ Please upload a valid image.', 'error'); return; }
      originalFile = file;
      originalImg.src = URL.createObjectURL(file);
      removeBgBtn.disabled = !window.removeBackgroundAI;
      generateBgBtn.disabled = true;
      downloadBtn.disabled = true;
      foregroundImg.src = ''; backgroundImg.src = '';
      fgBlob = null; bgBlob = null;
      ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
      setStatus('✅ Image loaded. Click "Remove Background" to start.', 'success');
    }

    // Remove Background
    removeBgBtn.addEventListener('click', async () => {
      if (!originalFile || !window.removeBackgroundAI) return;
      setStatus('⏳ Removing background... (Downloading AI model if first run)', 'loading');
      removeBgBtn.disabled = true;
      progressBar.style.display = 'block';
      
      try {
        const blob = await window.removeBackgroundAI(originalFile, {
          progress: (key, current, total) => {
            if (total > 0) setProgress((current / total) * 100);
          },
          model: { publicPath: 'https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.5.5/dist/' }
        });
        
        fgBlob = blob;
        const url = URL.createObjectURL(blob);
        foregroundImg.src = url;
        fgImg.onload = () => {
          setStatus('✅ Background removed! Generate a new one below.', 'success');
          progressBar.style.display = 'none';
          generateBgBtn.disabled = false;
          removeBgBtn.disabled = false;
        };
        fgImg.src = url;
      } catch (err) {
        setStatus('❌ Removal failed: ' + err.message, 'error');
        progressBar.style.display = 'none';
        removeBgBtn.disabled = false;
      }
    });

    // Generate AI Background
    generateBgBtn.addEventListener('click', async () => {
      if (!fgBlob) return;
      const prompt = encodeURIComponent(bgPrompt.value.trim() || 'modern studio background');
      setStatus('⏳ Generating AI background... (Takes 3-10s)', 'loading');
      generateBgBtn.disabled = true;
      progressBar.style.display = 'block';
      progressFill.style.width = '0%';
      
      try {
        // Pollinations AI is free & requires no API key
        const aiUrl = `https://image.pollinations.ai/prompt/${prompt}?width=1024&height=1024&nologo=true&seed=${Date.now()}`;
        
        // Simulate progress while fetching
        let fakeProgress = setInterval(() => {
          let w = parseInt(progressFill.style.width) || 0;
          if (w < 90) progressFill.style.width = `${w + 5}%`;
        }, 200);

        const res = await fetch(aiUrl);
        clearInterval(fakeProgress);
        if (!res.ok) throw new Error(`AI service error: ${res.status}`);
        
        bgBlob = await res.blob();
        const url = URL.createObjectURL(bgBlob);
        backgroundImg.src = url;
        bgImg.onload = () => {
          setStatus('✅ Background generated! Compositing result...', 'success');
          progressFill.style.width = '100%';
          setTimeout(() => progressBar.style.display = 'none', 500);
          composite();
          generateBgBtn.disabled = false;
          downloadBtn.disabled = false;
        };
        bgImg.src = url;
      } catch (err) {
        setStatus('❌ Generation failed: ' + err.message, 'error');
        progressBar.style.display = 'none';
        generateBgBtn.disabled = false;
      }
    });

    // Smart Compositing
    function composite() {
      const cw = Math.max(fgImg.width, bgImg.width);
      const ch = Math.max(fgImg.height, bgImg.height);
      resultCanvas.width = cw; resultCanvas.height = ch;

      // Draw background (cover fit)
      const bgAspect = bgImg.width / bgImg.height;
      const canvasAspect = cw / ch;
      let bw, bh, bx, by;
      if (bgAspect > canvasAspect) { bh = ch; bw = ch * bgAspect; bx = (cw - bw) / 2; by = 0; }
      else { bw = cw; bh = cw / bgAspect; bx = 0; by = (ch - bh) / 2; }
      ctx.drawImage(bgImg, bx, by, bw, bh);

      // Draw foreground (85% scale, centered)
      const scale = Math.min(cw * 0.85 / fgImg.width, ch * 0.85 / fgImg.height);
      const fw = fgImg.width * scale, fh = fgImg.height * scale;
      const fx = (cw - fw) / 2, fy = (ch - fh) / 2;
      ctx.drawImage(fgImg, fx, fy, fw, fh);
    }

    // Download
    downloadBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = `ai-bg-removed-${Date.now()}.png`;
      link.href = resultCanvas.toDataURL('image/png');
      link.click();
    });
  </script>
</body>
</html>
