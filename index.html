<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BG Remover Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: #f0ede8;
  color: #1a1a1a;
  min-height: 100vh;
}

.app {
  max-width: 900px;
  margin: 0 auto;
  padding: 2.5rem 1.25rem;
}

.header {
  text-align: center;
  margin-bottom: 2.5rem;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #EEEDFE;
  color: #3C3489;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 1rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.dot { width: 6px; height: 6px; border-radius: 50%; background: #7F77DD; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.header h1 {
  font-family: 'Syne', sans-serif;
  font-size: 2.4rem;
  font-weight: 700;
  letter-spacing: -0.04em;
  line-height: 1.1;
}

.header h1 span { color: #7F77DD; }

.header p {
  margin-top: 0.5rem;
  font-size: 14px;
  color: #777;
  font-weight: 300;
}

/* Upload Area */
.upload-area {
  background: #fff;
  border: 0.5px solid #ddd;
  border-radius: 16px;
  padding: 1.5rem;
  margin-bottom: 1.25rem;
  position: relative;
}

.drop-zone {
  border: 2px dashed #ccc;
  border-radius: 12px;
  padding: 3rem 1rem;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  color: #999;
}

.drop-zone:hover, .drop-zone.drag-over {
  border-color: #7F77DD;
  background: #EEEDFE18;
  color: #534AB7;
}

.drop-zone input[type=file] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.upload-icon {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: #f0ede8;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 1rem;
}

.drop-zone h3 {
  font-size: 15px;
  font-weight: 500;
  color: #333;
  margin-bottom: 4px;
}

.drop-zone p { font-size: 13px; }

/* Workspace */
.workspace {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 1.25rem;
}

@media (max-width: 580px) { .workspace { grid-template-columns: 1fr; } }

.panel {
  background: #fff;
  border: 0.5px solid #ddd;
  border-radius: 16px;
  overflow: hidden;
}

.panel-header {
  padding: 0.7rem 1rem;
  border-bottom: 0.5px solid #eee;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.panel-label {
  font-size: 11px;
  font-weight: 500;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}

.panel-body {
  min-height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  position: relative;
}

.img-preview {
  width: 100%;
  max-height: 260px;
  object-fit: contain;
  border-radius: 8px;
  display: block;
}

.checker {
  background: repeating-conic-gradient(#e0e0e0 0% 25%, #fff 0% 50%) 0 0 / 14px 14px;
  border-radius: 8px;
  width: 100%;
  min-height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.checker img {
  max-width: 100%;
  max-height: 260px;
  object-fit: contain;
  display: none;
}

.empty-state {
  text-align: center;
  color: #ccc;
  font-size: 13px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.empty-icon {
  width: 44px; height: 44px;
  border: 1.5px dashed #ddd;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Controls */
.controls {
  background: #fff;
  border: 0.5px solid #ddd;
  border-radius: 16px;
  padding: 1.25rem;
  margin-bottom: 1rem;
}

.controls-label {
  font-size: 11px;
  font-weight: 500;
  color: #999;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 0.75rem;
}

.btn-row {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.btn-main {
  flex: 1;
  min-width: 160px;
  padding: 12px 24px;
  background: #534AB7;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s, transform 0.1s;
}

.btn-main:hover:not(:disabled) { background: #3C3489; }
.btn-main:active:not(:disabled) { transform: scale(0.98); }
.btn-main:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-outline {
  padding: 12px 18px;
  background: transparent;
  color: #555;
  border: 0.5px solid #ccc;
  border-radius: 10px;
  font-size: 14px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: all 0.15s;
}

.btn-outline:hover:not(:disabled) { background: #f5f4f0; border-color: #aaa; }
.btn-outline:disabled { opacity: 0.35; cursor: not-allowed; }

/* Progress */
.progress-card {
  display: none;
  background: #fff;
  border: 0.5px solid #ddd;
  border-radius: 16px;
  padding: 1.25rem;
  margin-bottom: 1rem;
}

.progress-top {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #999;
  margin-bottom: 8px;
}

.bar-bg {
  height: 5px;
  background: #eee;
  border-radius: 5px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #7F77DD, #534AB7);
  border-radius: 5px;
  width: 0%;
  transition: width 0.4s ease;
}

.log { margin-top: 8px; font-size: 12px; color: #bbb; font-style: italic; }

/* Error */
.error-box {
  display: none;
  background: #fff8f8;
  border: 0.5px solid #f5c6c6;
  border-radius: 12px;
  padding: 0.85rem 1rem;
  font-size: 13px;
  color: #c0392b;
  margin-bottom: 1rem;
  display: none;
  align-items: center;
  gap: 8px;
}

/* Spinner */
.spinner {
  width: 17px; height: 17px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
  flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Credits badge */
.credits-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #f0ede8;
  border: 0.5px solid #ddd;
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: #888;
}

.credits-badge span { font-weight: 500; color: #444; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="badge"><div class="dot"></div>remove.bg powered</div>
    <h1>Background <span>Remover</span> Pro</h1>
    <p>Upload a photo — AI instantly removes the background with precision</p>
  </div>

  <!-- Upload -->
  <div class="upload-area" id="upload-area" style="display:block;">
    <div class="drop-zone" id="drop-zone">
      <input type="file" id="file-input" accept="image/png,image/jpeg,image/webp,image/gif">
      <div class="upload-icon">
        <svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#7F77DD" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
      </div>
      <h3>Drop your photo here</h3>
      <p>or click to browse &nbsp;·&nbsp; JPG, PNG, WEBP up to 12MB</p>
    </div>
  </div>

  <!-- Error -->
  <div class="error-box" id="error-box">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#c0392b" stroke-width="2" style="flex-shrink:0">
      <circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/>
    </svg>
    <span id="error-text"></span>
  </div>

  <!-- Workspace (shown after image loaded) -->
  <div class="workspace" id="workspace" style="display:none;">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Original</span>
        <span id="file-info" class="credits-badge"><span>—</span></span>
      </div>
      <div class="panel-body">
        <img id="original-img" class="img-preview" alt="Original" style="display:none;">
        <div class="empty-state" id="orig-empty">
          <div class="empty-icon">
            <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#ccc" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 16l5-5 4 4 3-3 4 4"/></svg>
          </div>
          No image
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-label">Result</span>
        <span id="result-status" class="credits-badge"><span>Awaiting</span></span>
      </div>
      <div class="panel-body" style="padding:0;">
        <div class="checker" id="checker">
          <img id="result-img" alt="Result">
          <div class="empty-state" id="result-empty">
            <div class="empty-icon">
              <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#ccc" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            </div>
            Result here
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls" id="controls" style="display:none;">
    <div class="controls-label">Actions</div>
    <div class="btn-row">
      <button class="btn-main" id="remove-btn" onclick="removeBg()">
        <svg id="btn-icon" width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M12 22C6.48 22 2 17.52 2 12S6.48 2 12 2s10 4.48 10 10-4.48 10-10 10zm-1-7v2h2v-2h-2zm0-8v6h2V7h-2z"/>
        </svg>
        <div class="spinner" id="spinner"></div>
        <span id="btn-label">Remove Background</span>
      </button>

      <button class="btn-outline" id="download-btn" onclick="downloadResult()" disabled>
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/>
        </svg>
        Download PNG
      </button>

      <button class="btn-outline" onclick="resetAll()">
        <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 109-9M3 3v6h6"/>
        </svg>
        New Photo
      </button>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-card" id="progress-card">
    <div class="progress-top">
      <span id="prog-label">Removing background...</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="bar-fill"></div></div>
    <div class="log" id="prog-log">Initializing...</div>
  </div>

</div>

<script>
const API_KEY = '1UQrnmb6toL6kUNErHCXqLLQ';
let originalFile = null;
let resultBlob = null;

const fileInput   = document.getElementById('file-input');
const dropZone    = document.getElementById('drop-zone');
const origImg     = document.getElementById('original-img');
const resultImg   = document.getElementById('result-img');
const removeBtn   = document.getElementById('remove-btn');
const downloadBtn = document.getElementById('download-btn');
const spinner     = document.getElementById('spinner');
const btnIcon     = document.getElementById('btn-icon');
const btnLabel    = document.getElementById('btn-label');
const barFill     = document.getElementById('bar-fill');
const progPct     = document.getElementById('prog-pct');
const progLog     = document.getElementById('prog-log');
const errorBox    = document.getElementById('error-box');
const errorText   = document.getElementById('error-text');
const workspace   = document.getElementById('workspace');
const controls    = document.getElementById('controls');
const progressCard= document.getElementById('progress-card');
const checker     = document.getElementById('checker');
const resultEmpty = document.getElementById('result-empty');

// Drag & drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault(); dropZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

function handleFile(file) {
  if (!file.type.startsWith('image/')) { showError('Please upload an image file (JPG, PNG, WEBP).'); return; }
  if (file.size > 12 * 1024 * 1024) { showError('File too large. Maximum size is 12MB.'); return; }
  clearError();
  originalFile = file;
  resultBlob = null;

  const url = URL.createObjectURL(file);
  origImg.src = url;
  origImg.style.display = 'block';
  document.getElementById('orig-empty').style.display = 'none';

  const kb = (file.size / 1024).toFixed(0);
  document.getElementById('file-info').innerHTML = `<span>${kb} KB</span>`;

  resultImg.style.display = 'none';
  resultEmpty.style.display = 'flex';
  document.getElementById('result-status').innerHTML = '<span>Awaiting</span>';
  downloadBtn.disabled = true;
  progressCard.style.display = 'none';

  workspace.style.display = 'grid';
  controls.style.display = 'block';
  document.getElementById('upload-area').style.display = 'none';
}

function setProgress(pct, label, log) {
  barFill.style.width = pct + '%';
  progPct.textContent = Math.round(pct) + '%';
  if (label) document.getElementById('prog-label').textContent = label;
  if (log) progLog.textContent = log;
}

function showError(msg) {
  errorText.textContent = msg;
  errorBox.style.display = 'flex';
}

function clearError() {
  errorBox.style.display = 'none';
  errorText.textContent = '';
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload = () => res(reader.result.split(',')[1]);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
}

async function removeBg() {
  if (!originalFile) return;
  clearError();

  removeBtn.disabled = true;
  spinner.style.display = 'block';
  btnIcon.style.display = 'none';
  btnLabel.textContent = 'Removing...';
  progressCard.style.display = 'block';
  resultImg.style.display = 'none';
  resultEmpty.style.display = 'flex';
  resultEmpty.innerHTML = '<div style="font-size:13px;color:#bbb;font-style:italic;">Processing...</div>';
  setProgress(10, 'Reading image...', 'Converting to base64...');

  try {
    const b64 = await toBase64(originalFile);
    setProgress(30, 'Sending to remove.bg...', 'Uploading image data...');

    const resp = await fetch('https://api.remove.bg/v1.0/removebg', {
      method: 'POST',
      headers: {
        'X-Api-Key': API_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        image_file_b64: b64,
        size: 'auto',
        format: 'png'
      })
    });

    setProgress(70, 'AI removing background...', 'Analyzing subject edges...');
    setProgress(85, 'Finalizing...', 'Processing result image...');

    if (!resp.ok) {
      let msg = `Error ${resp.status}`;
      try {
        const j = await resp.json();
        msg = j?.errors?.[0]?.title || msg;
      } catch {}
      if (resp.status === 402) msg = 'No credits left on API key. Please top up at remove.bg.';
      if (resp.status === 403) msg = 'Invalid API key.';
      if (resp.status === 429) msg = 'Rate limit reached. Please wait and try again.';
      throw new Error(msg);
    }

    resultBlob = await resp.blob();
    const resultUrl = URL.createObjectURL(resultBlob);

    setProgress(100, 'Done!', 'Background removed successfully.');

    resultImg.src = resultUrl;
    resultImg.style.display = 'block';
    resultEmpty.style.display = 'none';
    document.getElementById('result-status').innerHTML = '<span style="color:#27ae60;">✓ Done</span>';
    downloadBtn.disabled = false;

    // Credits from header
    const credits = resp.headers.get('X-Credits-Charged');
    if (credits) document.getElementById('file-info').innerHTML = `<span>${(originalFile.size/1024).toFixed(0)} KB</span>`;

    setTimeout(() => { progressCard.style.display = 'none'; }, 1500);

  } catch (err) {
    showError(err.message);
    setProgress(0, 'Failed', err.message);
    resultEmpty.style.display = 'flex';
    resultEmpty.innerHTML = `<div class="empty-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#ccc" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div><span style="font-size:13px;color:#ccc;">Result here</span>`;
  } finally {
    removeBtn.disabled = false;
    spinner.style.display = 'none';
    btnIcon.style.display = 'block';
    btnLabel.textContent = 'Remove Background';
  }
}

function downloadResult() {
  if (!resultBlob) return;
  const name = (originalFile?.name || 'image').replace(/\.[^.]+$/, '') + '_no_bg.png';
  const a = document.createElement('a');
  a.href = URL.createObjectURL(resultBlob);
  a.download = name;
  a.click();
}

function resetAll() {
  originalFile = null; resultBlob = null;
  workspace.style.display = 'none';
  controls.style.display = 'none';
  progressCard.style.display = 'none';
  document.getElementById('upload-area').style.display = 'block';
  fileInput.value = '';
  origImg.style.display = 'none';
  document.getElementById('orig-empty').style.display = 'flex';
  resultImg.style.display = 'none';
  resultEmpty.style.display = 'flex';
  resultEmpty.innerHTML = `<div class="empty-icon"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="#ccc" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg></div><span>Result here</span>`;
  downloadBtn.disabled = true;
  clearError();
  barFill.style.width = '0%';
}
</script>
</body>
</html>
